services:
  panel_dashboard:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* se incrustan en build (laboratorio: key en cliente).
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
    container_name: panel_dashboard
    restart: always
    ports:
      - "3052:3000"   # host 3052 (libre) -> contenedor 3000
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0

# El dashboard solo expone un puerto (no habla con otros contenedores), así que
# reusa la red 'bridge' existente en vez de crear una nueva. Esto evita el error
# "all predefined address pools have been fully subnetted" en el VPS compartido.
networks:
  default:
    name: bridge
    external: true
